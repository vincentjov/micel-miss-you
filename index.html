<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Micel</title>

<style>
html, body {
  height: 100%;
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
}

.wrap {
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  flex-direction: column;
}

/* Heart animation */
.heart {
  font-size: 120px;
  color: red;
  animation: heartbeat 1s infinite;
  margin-bottom: 30px;
}

@keyframes heartbeat {
  0% { transform: scale(1); }
  25% { transform: scale(1.2); }
  40% { transform: scale(1); }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

/* Blinking text */
.msg {
  font-size: clamp(40px, 10vw, 120px);
  font-weight: 900;
  text-transform: uppercase;
  animation: blink 0.8s infinite;
}

@keyframes blink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0; }
}

</style>
</head>

<body>

<div class="wrap">

<div class="heart">❤️</div>

<div class="msg">
MICEL I MISS YOU
</div>

</div>

</body>
</html>
