<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Micel</title>
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    .wrap {
      height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
    }

    .msg {
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: clamp(40px, 10vw, 120px);
      line-height: 1.05;

      /* Blink + slight scale pulse */
      animation: blink 0.8s steps(1, end) infinite, pulse 0.9s ease-in-out infinite;
      text-shadow: 0 0 18px rgba(255,255,255,0.35);
    }

    @keyframes blink {
      0%, 49%   { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.03); }
    }

    /* Optional: tap/click to toggle blink (nice on mobile) */
    .hint {
      margin-top: 18px;
      font-size: 14px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div>
      <div class="msg" id="msg">Micel I miss you</div>
      <div class="hint">Tap text to toggle blinking</div>
    </div>
  </div>

  <script>
    const el = document.getElementById("msg");
    let blinking = true;

    el.addEventListener("click", () => {
      blinking = !blinking;
      el.style.animation = blinking
        ? "blink 0.8s steps(1, end) infinite, pulse 0.9s ease-in-out infinite"
        : "pulse 0.9s ease-in-out infinite";
      el.style.opacity = "1";
    });
  </script>
</body>
</html>
